<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSDS 검색 시스템 - 물질안전보건자료 관리</title>
    <meta name="description" content="전문 MSDS(물질안전보건자료) 검색 및 관리 시스템">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <img src="/images/skecoplant-ci.png" alt="SK에코플랜트" class="sk-logo">
                    <div class="logo-text">
                        <span class="logo-title">MSDS 검색 시스템</span>
                        <span class="logo-brand">SK에코플랜트</span>
                    </div>
                </div>
                <div class="header-actions">
                    <div class="header-stats">
                        <div class="stat-item">
                            <span class="stat-number" id="totalCount">0</span>
                            <span class="stat-label">전체 자료</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-number" id="categoryCount">17</span>
                            <span class="stat-label">카테고리</span>
                        </div>
                    </div>
                    <div class="header-btns">
                        <a href="/dashboard.html" class="btn btn-outline">
                            <i class="fas fa-chart-bar"></i> 대시보드
                        </a>
                        <a href="/admin.html" class="btn btn-outline">
                            <i class="fas fa-lock"></i> 관리자
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Hero Search Section -->
    <section class="hero-search">
        <div class="container">
            <h1 class="hero-title">어떤 MSDS를 찾으세요?</h1>

            <!-- 검색 바 -->
            <div class="search-box">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" class="search-input"
                    placeholder="제품명, 제조사, CAS번호로 검색..." autocomplete="off">
                <button class="clear-search" id="clearSearch" style="display: none;">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <!-- 인기 카테고리 태그 -->
            <div class="quick-tags" id="quickTags"></div>

            <!-- 필터 패널 -->
            <div class="filter-panel">
                <div class="filter-tabs-nav">
                    <button class="filter-tab-btn active" data-tab="category">
                        <span class="tab-check"><i class="fas fa-check"></i></span> 카테고리별 찾기
                    </button>
                    <span class="tab-divider">|</span>
                    <button class="filter-tab-btn" data-tab="hazard">위험등급별 찾기</button>
                    <span class="tab-divider">|</span>
                    <button class="filter-tab-btn" data-tab="manufacturer">제조사별 찾기</button>
                </div>
                <div class="filter-dropdowns-row">
                    <div class="filter-select-wrap" id="selectWrapCategory">
                        <select id="selectCategory" class="filter-select">
                            <option value="">카테고리</option>
                        </select>
                        <i class="fas fa-chevron-down select-arrow"></i>
                    </div>
                    <div class="filter-select-wrap" id="selectWrapHazard">
                        <select id="selectHazard" class="filter-select">
                            <option value="">위험등급</option>
                        </select>
                        <i class="fas fa-chevron-down select-arrow"></i>
                    </div>
                    <div class="filter-select-wrap" id="selectWrapManufacturer">
                        <select id="selectManufacturer" class="filter-select">
                            <option value="">제조사</option>
                        </select>
                        <i class="fas fa-chevron-down select-arrow"></i>
                    </div>
                    <button class="btn-filter-search" id="filterSearchBtn">검색하기</button>
                </div>
            </div>

            <div class="search-results-info" id="searchResultsInfo"></div>
        </div>
    </section>

    <!-- MSDS Cards Section -->
    <section class="cards-section">
        <div class="container">
            <div class="section-header">
                <h2><i class="fas fa-file-alt"></i> MSDS 목록</h2>
                <div class="view-options">
                    <button class="btn-reset" id="resetFilters">
                        <i class="fas fa-redo"></i> 초기화
                    </button>
                    <button class="view-btn active" data-view="grid" title="그리드 보기"><i class="fas fa-th"></i></button>
                    <button class="view-btn" data-view="list" title="리스트 보기"><i class="fas fa-list"></i></button>
                </div>
            </div>
            <div class="cards-grid" id="cardsContainer"></div>
            <div id="pagination" class="pagination"></div>
            <div class="no-results" id="noResults" style="display: none;">
                <i class="fas fa-search"></i>
                <h3>검색 결과가 없습니다</h3>
                <p>다른 검색어나 필터를 시도해보세요.</p>
            </div>
        </div>
    </section>

    <!-- ========== PDF 상세보기 모달 ========== -->
    <div class="modal" id="pdfModal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">MSDS 상세보기</h2>
                <button class="modal-close" id="closeModal"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="msds-info" id="msdsInfo"></div>

                <!-- 좌우 분할 뷰어 -->
                <div class="modal-viewer-area">
                    <div class="tab-pane" id="tabContent">
                        <div class="msds-content-html" id="msdsContentHtml"></div>
                    </div>
                    <div class="tab-pane" id="tabPdf">
                        <div class="pdf-viewer-container">
                            <iframe id="pdfViewer" frameborder="0"></iframe>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <a href="#" class="btn btn-primary" id="downloadBtn" download>
                    <i class="fas fa-download"></i> 다운로드
                </a>
                <button class="btn btn-secondary" id="closeModalBtn">
                    <i class="fas fa-times"></i> 닫기
                </button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2026 SK에코플랜트 · MSDS 검색 시스템. All rights reserved.</p>
                <p class="footer-note">
                    <i class="fas fa-info-circle"></i>
                    물질안전보건자료는 화학물질의 안전한 취급을 위한 필수 정보입니다.
                </p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
